<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FedEx Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border-top: 5px solid #FF6200; /* FedEx Orange */
        }
        .logo { width: 140px; margin-bottom: 25px; }
        h2 { color: #4A148C; margin-bottom: 20px; font-size: 20px; } /* FedEx Purple */
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #4A148C;
        }
        input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4A148C;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #3b0f6b; }
    </style>
</head>
<body>
    <div class="login-container">
        <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 216.4 70">
            <path fill="#4A148C" d="M49.3,12.6h-13c-2.6,0-5,1-7.1,2.8c-2,1.7-3.1,4.1-3.1,6.6v12.1h-10v-12c0-4.9,2-9.5,5.6-12.8C25.4,6,30.2,4,35.5,4h13.8V12.6z"/>
            <path fill="#4A148C" d="M36.3,34.1h-10v10.3h13c2.4,0,4.7-0.9,6.5-2.5c1.7-1.5,2.7-3.6,2.7-5.8v-2H36.3z"/>
            <path fill="#4A148C" d="M10,34.1H0v31.4h10V34.1z"/>
            <path fill="#4A148C" d="M56.7,44.4h12.4c0.9-1.5,1.4-3.2,1.4-4.9c0-5.1-3.8-9.3-8.8-9.3c-5,0-9.2,4.1-9.2,9.3c0,5.1,4.1,9.3,9.2,9.3c1.6,0,3.2-0.4,4.6-1.2l2.5,3.7c-2,1.3-4.4,2-6.9,2c-7.6,0-13.8-6-13.8-13.4s6.2-13.4,13.8-13.4c7.3,0,13.3,5.6,13.8,12.8h-19V44.4z"/>
            <path fill="#4A148C" d="M101.8,30.2h-8.6v-5h8.6V15.8h-8.6c-7.1,0-12.8,5.8-12.8,12.8v36.9h10V43.9h7.5l3.4,21.6h10.4L101.8,30.2z"/>
            <path fill="#FF6200" d="M140,51.7h16.5l-5.6-8l5.6-7.8H140l-9.2,13L140,51.7z"/>
            <path fill="#FF6200" d="M136.6,35.9h-17.3l-3.6,5.4l-3.8-5.4h-9.6l7.6,10.7l-7.9,11.1h9.6l4-5.8l3.7,5.8h17.8l-9.4-13.6L136.6,35.9z"/>
            <path fill="#FF6200" d="M216.4,51c0-10.5-8.5-19.1-19.1-19.1c-10.5,0-19.1,8.5-19.1,19.1c0,10.5,8.5,19.1,19.1,19.1C207.8,70,216.4,61.5,216.4,51z M197.3,63.9c-7.1,0-12.9-5.8-12.9-12.9c0-7.1,5.8-12.9,12.9-12.9c7.1,0,12.9,5.8,12.9,12.9C210.2,58.1,204.4,63.9,197.3,63.9z"/>
        </svg>
        <h2>Admin Gateway</h2>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="adminPass" placeholder="Access Password">
        </div>
        <button onclick="attemptLogin()">Authorize Access</button>
    </div>

    <script>
        async function attemptLogin() {
            const pass = document.getElementById('adminPass').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password: pass })
            });
            if (res.ok) {
                sessionStorage.setItem('fedex_admin', 'true');
                window.location.href = 'admin-dashboard.html';
            } else {
                alert("Access Denied: Invalid Credentials");
            }
        }
    </script>
</body>
</html>
